name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest black
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      run: |
        black --check src/ || true
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --tb=short || echo "No tests yet"
    
    - name: Check agents load correctly
      run: |
        python -c "from src.agents import MonicaAgent, DwightAgent, KellyAgent, RossAgent, PamAgent, RachelAgent; print('✅ All agents import successfully')"
    
    - name: Check coordinator loads
      run: |
        python -c "from src.coordinator.agent_coordinator import AgentCoordinator; print('✅ Coordinator imports successfully')"

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build -f deploy/Dockerfile -t telegram-workforce:test .
    
    - name: Test Docker image
      run: |
        docker run --rm telegram-workforce:test python --version
