version: '3.8'

services:
  workforce:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: telegram-workforce
    restart: unless-stopped
    volumes:
      - ../memory:/app/memory
      - ../config:/app/config
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
